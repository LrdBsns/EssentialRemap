name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle and generate wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q gradle-8.6-bin.zip -d /opt/gradle
          export PATH="/opt/gradle/gradle-8.6/bin:$PATH"
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH
          ls -la
          gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4.6.2
        with:
          name: EssentialRemap-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
